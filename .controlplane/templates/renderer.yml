kind: workload
name: renderer
spec:
  type: standard
  containers:
    - name: renderer
      cpu: 500m
      inheritEnv: true
      image: "{{APP_IMAGE_LINK}}"
      memory: 1Gi
      args:
        - node
        - client/node-renderer.cjs
      ports:
        - number: 3800
          protocol: http2
  defaultOptions:
    autoscaling:
      minScale: 1
      maxScale: 1
    capacityAI: false
    timeoutSeconds: 120
  firewallConfig:
    external:
      outboundAllowCIDR:
        - 0.0.0.0/0
    internal:
      inboundAllowType: same-gvc
  identityLink: "{{APP_IDENTITY_LINK}}"
