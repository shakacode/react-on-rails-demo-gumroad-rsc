kind: workload
name: rails
spec:
  type: standard
  containers:
    - name: rails
      cpu: 1000m
      env:
        - name: PORT
          value: "3000"
      inheritEnv: true
      image: "{{APP_IMAGE_LINK}}"
      memory: 2Gi
      ports:
        - number: 3000
          protocol: http
  defaultOptions:
    autoscaling:
      minScale: 1
      maxScale: 1
    capacityAI: false
    timeoutSeconds: 120
  firewallConfig:
    external:
      inboundAllowCIDR:
        - 0.0.0.0/0
      outboundAllowCIDR:
        - 0.0.0.0/0
  identityLink: "{{APP_IDENTITY_LINK}}"
