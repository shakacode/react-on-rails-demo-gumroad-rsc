kind: workload
name: memcached
spec:
  type: standard
  containers:
    - name: memcached
      cpu: 50m
      memory: 64Mi
      image: memcached:alpine
      args:
        - "-l"
        - 0.0.0.0
      ports:
        - number: 11211
          protocol: tcp
  defaultOptions:
    autoscaling:
      metric: disabled
      minScale: 1
      maxScale: 1
    capacityAI: false
  firewallConfig:
    internal:
      inboundAllowType: same-gvc
