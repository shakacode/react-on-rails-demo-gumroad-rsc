# Keys beginning with "cpln_" correspond to settings in Control Plane.
#
# This deploy config is intentionally scoped to the public RSC comparison demo,
# not Gumroad's full production infrastructure.

allow_org_override_by_env: true
allow_app_override_by_env: true

aliases:
  common: &common
    cpln_org: shakacode-open-source-examples-staging
    default_location: aws-us-east-2
    setup_app_templates:
      - app
      - mysql
      - redis
      - memcached
      - mongo
      - elasticsearch
      - rails
      - renderer

    one_off_workload: rails
    app_workloads:
      - rails
      - renderer
    additional_workloads:
      - mysql
      - redis
      - memcached
      - mongo
      - elasticsearch

    maintenance_workload: maintenance
    release_script: release_script.sh

    stale_app_image_deployed_days: 5
    image_retention_days: 7

  production: &production
    <<: *common
    allow_org_override_by_env: false
    allow_app_override_by_env: false
    cpln_org: shakacode-open-source-examples-production
    upstream: react-on-rails-demo-gumroad-rsc-staging

apps:
  react-on-rails-demo-gumroad-rsc-staging:
    <<: *common

  react-on-rails-demo-gumroad-rsc-review-pr:
    <<: *common
    match_if_app_name_starts_with: true

  react-on-rails-demo-gumroad-rsc-production:
    <<: *production
