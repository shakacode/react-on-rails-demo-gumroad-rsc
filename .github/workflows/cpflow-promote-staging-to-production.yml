name: Promote Staging to Production

on:
  workflow_dispatch:
    inputs:
      confirm_promotion:
        description: Type "promote" to confirm promotion of staging to production
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-production-db-secrets:
    if: github.event.inputs.confirm_promotion == 'promote'
    environment: production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Control Plane CLI
        run: npm install -g @controlplane/cli@3.10.2
      - name: Prepare production database secrets
        env:
          CPLN_TOKEN: ${{ secrets.CPLN_TOKEN_PRODUCTION }}
          CPLN_ORG: ${{ vars.CPLN_ORG_PRODUCTION || 'shakacode-open-source-examples-production' }}
          APP_NAME: ${{ vars.PRODUCTION_APP_NAME || 'react-on-rails-demo-gumroad-rsc-production' }}
        run: bin/prepare-control-plane-db-secrets "$APP_NAME" --org "$CPLN_ORG"

  promote-to-production:
    needs: prepare-production-db-secrets
    if: github.event.inputs.confirm_promotion == 'promote'
    uses: shakacode/control-plane-flow/.github/workflows/cpflow-promote-staging-to-production.yml@v5.0.4
    with:
      production_environment: production
    secrets:
      CPLN_TOKEN_STAGING: ${{ secrets.CPLN_TOKEN_STAGING }}
